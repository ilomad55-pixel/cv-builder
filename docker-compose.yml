version: "3.8"

# Dev : PostgreSQL uniquement — l'app tourne en local avec `npm run dev`
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cvbuilder
      POSTGRES_PASSWORD: cvbuilder_secret
      POSTGRES_DB: cvbuilder_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvbuilder -d cvbuilder_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
